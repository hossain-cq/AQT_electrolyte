name: aqt-electrolyte
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Core scientific stack
  - numpy>=1.24,<2.0
  - matplotlib>=3.7,<4.0
  - scipy>=1.11,<2.0
  - pyyaml>=6.0

  # Jupyter
  - jupyter
  - ipykernel
  - ipywidgets

  - pip:
      # Quantum chemistry
      - pyscf>=2.4,<3.0

      # Qiskit ecosystem — versions must match each other
      - qiskit==1.1.0
      - qiskit-aer==0.14.2
      - qiskit-nature==0.7.2
      - qiskit-algorithms==0.3.0
      - qiskit-ibm-runtime>=0.20,<1.0

      # Fast Fermionic simulation (for SQD notebooks)
      - ffsim>=0.0.35

      # Machine learning (optional — DNN-VQE notebook only)
      - torch>=2.1,<3.0
      - scikit-learn>=1.3,<2.0
